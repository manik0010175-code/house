<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Dashboard Month Print</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#eef2f7; padding:10px; }
.card { background:#fff; padding:10px; margin:8px 0; border-radius:8px; }
button { padding:8px 12px; margin:4px; border:none; border-radius:5px; cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }
th { background:#007bff; color:white; }
tfoot td { font-weight:bold; background:#f1f1f1; }
input { width:95%; height:36px; text-align:center; border:none; font-size:16px; }
canvas { width:30% !important; height:25% !important; display:block; margin:auto; }

body.exporting button, body.exporting select { display:none; }

#monthPrint { display:none; text-align:center; font-weight:bold; margin-bottom:5px; font-size:16px; }

@media print {
  #monthPrint { display:block; }
}
</style>
</head>
<body>
<div id="captureArea">

<h2>💰 Expense Dashboard</h2>
<div class="card" style="text-align:center;">
<input type="month" id="monthPicker">
<div id="monthPrint"></div>
</div>

<div class="card" style="text-align:center;">
<button onclick="addRow()">➕ Add Row</button>
<button onclick="removeRow()">➖ Remove Row</button>
<button onclick="downloadImage()">📸 Image</button>
<button onclick="downloadPDF()">📄 PDF</button>
<button onclick="window.print()">🖨 Print</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Family</th><th>$</th>
<th>Car</th><th>$</th>
<th>My</th><th>$</th>
<th>Her</th><th>$</th>
</tr>
</thead>
<tbody id="rows"></tbody>
<tfoot>
<tr>
<td>Total</td><td id="f">$0.00</td>
<td>Total</td><td id="c">$0.00</td>
<td>Total</td><td id="m">$0.00</td>
<td>Total</td><td id="h">$0.00</td>
</tr>
<tr>
<td colspan="7">Grand Total</td>
<td id="g">$0.00</td>
</tr>
<tr>
<td colspan="7">Without Car</td>
<td id="w">$0.00</td>
</tr>
</tfoot>
</table>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<script>
const cols=["family","car","my","her"];
const tbody=document.getElementById("rows");

// Month print
const monthPicker=document.getElementById("monthPicker");
const monthPrint=document.getElementById("monthPrint");
monthPicker.addEventListener("change",()=>{
  const val=monthPicker.value;
  if(val){
    const [y,m]=val.split("-");
    const monthName=new Date(val+"-01").toLocaleString("default",{month:"long"});
    monthPrint.innerText=monthName+" "+y;
  } else { monthPrint.innerText=""; }
});

// Add row
function addRow(data=[]){
  let tr=document.createElement("tr");
  tr.innerHTML=`
<td><input></td><td><input class="family" inputmode="decimal"></td>
<td><input></td><td><input class="car" inputmode="decimal"></td>
<td><input></td><td><input class="my" inputmode="decimal"></td>
<td><input></td><td><input class="her" inputmode="decimal"></td>`;
  tbody.appendChild(tr);

  const inputs=tr.querySelectorAll("input");
  inputs.forEach((i,idx)=>{
    if(data[idx]) i.value=data[idx];

    i.addEventListener("input",()=>{
      if(cols.some(c=>i.classList.contains(c))){
        i.value=i.value.replace(/[^0-9.]/g,'');
      }
      calculate();
      save();
    });

    i.addEventListener("keydown",(e)=>{
      const allInputs=[...document.querySelectorAll("input")];
      const index=allInputs.indexOf(i);

      if(e.key==="Enter"){
        e.preventDefault();
        if(allInputs[index+8]) allInputs[index+8].focus();
        else { addRow(); tbody.lastChild.querySelectorAll("input")[idx].focus(); }
      }
      if(e.key==="ArrowRight" && allInputs[index+1]) allInputs[index+1].focus();
      if(e.key==="ArrowLeft" && allInputs[index-1]) allInputs[index-1].focus();
      if(e.key==="ArrowDown" && allInputs[index+8]) allInputs[index+8].focus();
      if(e.key==="ArrowUp" && allInputs[index-8]) allInputs[index-8].focus();
    });
  });
}

// Remove row
function removeRow(){
  if(tbody.lastChild) tbody.removeChild(tbody.lastChild);
  calculate(); save();
}

// Calculate totals
function calculate(){
  let t={family:0,car:0,my:0,her:0};
  cols.forEach(c=>{
    document.querySelectorAll("."+c).forEach(i=> t[c]+=parseFloat(i.value)||0 );
  });

  f.innerText="$"+t.family.toFixed(2);
  c.innerText="$"+t.car.toFixed(2);
  m.innerText="$"+t.my.toFixed(2);
  h.innerText="$"+t.her.toFixed(2);

  let grand=t.family+t.car+t.my+t.her;
  g.innerText="$"+grand.toFixed(2);
  w.innerText="$"+(grand-t.car).toFixed(2);

  chart.data.datasets[0].data=[t.family,t.car,t.my,t.her];
  chart.update();
}

// Save / Load
function save(){
  let data=[];
  document.querySelectorAll("#rows tr").forEach(tr=>{
    data.push([...tr.querySelectorAll("input")].map(i=>i.value));
  });
  localStorage.setItem("data",JSON.stringify(data));
}

function load(){
  let d=JSON.parse(localStorage.getItem("data")||"[]");
  if(d.length===0){ for(let i=0;i<8;i++) addRow(); }
  else d.forEach(r=>addRow(r));
}

// IMAGE
function downloadImage(){
  document.body.classList.add("exporting");
  setTimeout(()=>{
    html2canvas(document.getElementById("captureArea"),{scale:2,backgroundColor:"#fff"})
    .then(c=>{
      document.body.classList.remove("exporting");
      let a=document.createElement("a");
      a.download="report.png";
      a.href=c.toDataURL();
      a.click();
    });
  },500);
}

// PDF
async function downloadPDF(){
  document.body.classList.add("exporting");
  setTimeout(async ()=>{
    const canvas=await html2canvas(document.getElementById("captureArea"),{scale:2});
    const img=canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf=new jsPDF("p","mm","a4");
    pdf.addImage(img,"PNG",0,0,210,297);
    pdf.save("report.pdf");
    document.body.classList.remove("exporting");
  },500);
}

// Chart
let chart=new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{
    labels:["Family","Car","My","Her"],
    datasets:[{data:[0,0,0,0], backgroundColor:['#4e73df','#e74a3b','#1cc88a','#f6c23e']}]
  },
  options:{ plugins:{ legend:{ position:'bottom' }}, cutout:'60%' }
});

// Init
load();
calculate();
</script>
</body>
</html>
