<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  padding:10px;
}

.card{
  background:#fff;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}

button{
  padding:8px 12px;
  margin:4px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
  word-break:break-word;
}

th{
  background:#007bff;
  color:white;
}

tfoot td{
  font-weight:bold;
  background:#f1f1f1;
}

input{
  width:100%;
  height:36px;
  text-align:center;
  border:none;
  font-size:16px;
}

canvas{
  width:100% !important;
  height:auto !important;
  display:block;
  margin:auto;
}

@media (max-width:768px){
  table{ font-size:13px; }
  th,td{ padding:5px; }
}

body.exporting button{
  display:none;
}
th:nth-child(1), td:nth-child(1){
  width:25%;
}

th:nth-child(3), td:nth-child(3){
  width:15%;
}

th:nth-child(5), td:nth-child(5){
  width:15%;
}

th:nth-child(7), td:nth-child(7){
  width:15%;
}

th:nth-child(2), td:nth-child(2),
th:nth-child(4), td:nth-child(4),
th:nth-child(6), td:nth-child(6),
th:nth-child(8), td:nth-child(8){
  width:7.5%;
}
.sugbox{
  background:#fff;
  border:1px solid #ccc;
  font-size:13px;
  position:absolute;
  z-index:10;
}

.sugbox div{
  padding:4px;
  cursor:pointer;
}

.sugbox div:hover{
  background:#eee;
}
#captureArea{
  max-width:1200px;
  margin:auto;
}
#captureArea{
  width:1200px;
  margin:auto;
}
/* 📱 MOBILE UI IMPROVEMENT */
@media (max-width: 768px){

  body{
    padding:6px;
    background:#f4f6fb;
  }

  h2{
    font-size:18px;
    text-align:center;
    margin:8px 0;
  }

  .card{
    padding:10px;
    margin:6px 0;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
  }

  button{
    width:100%;
    margin:6px 0;
    padding:12px;
    font-size:14px;
    border-radius:10px;
  }

  input{
    height:34px;
    font-size:14px;
    border-radius:6px;
  }

  table{
    font-size:11px;
    min-width:750px;
  }

  th,td{
    padding:4px;
  }

  #tableArea{
    overflow-x:auto;
    border-radius:10px;
  }

  #chartArea{
    padding:10px;
  }

  canvas{
    max-width:100%;
  }

  .sugbox{
    font-size:12px;
  }
}
button{
  background:#007bff;
  color:white;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

</style>
</head>

<body>

<div id="captureArea">

<h2>💰 Expense Dashboard</h2>

<div class="card" style="text-align:center;">
<input type="month" id="monthPicker">
</div>

<div class="card" style="text-align:center;">
  <button onclick="loadYearly()">📊 Yearly Statement</button>
<button onclick="addRow()">➕ Add Row</button>
<button onclick="removeRow()">➖ Remove Row</button>
<button onclick="downloadImage()">📸 Download Images</button>
<button onclick="downloadPDF()">📄 Download PDF</button>
<button onclick="clearScreen()">🧹 Clear Screen</button>
</div>

<div id="yearResult"></div>
<div id="monthDetails"></div>

<div class="card" id="tableArea">
<table>
<thead>
<tr>
<th>Family</th><th>$</th>
<th>Car</th><th>$</th>
<th>My</th><th>$</th>
<th>Her</th><th>$</th>
</tr>
</thead>

<tbody id="rows"></tbody>

<tfoot>
<tr>
<td>Total</td><td id="f">$0</td>
<td>Total</td><td id="c">$0</td>
<td>Total</td><td id="m">$0</td>
<td>Total</td><td id="h">$0</td>
</tr>
<tr>
<td colspan="7">Grand</td>
<td id="g">$0</td>
</tr>
<tr>
<td colspan="7">Without Car</td>
<td id="w">$0</td>
</tr>
</tfoot>
</table>
</div>

<div class="card" id="chartArea">
<canvas id="chart"></canvas>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>

<script>
let history = JSON.parse(localStorage.getItem("suggest_history") || "[]");
const cols=["family","car","my","her"];
const tbody=document.getElementById("rows");
const monthPicker = document.getElementById("monthPicker");

const f = document.getElementById("f");
const c = document.getElementById("c");
const m = document.getElementById("m");
const h = document.getElementById("h");
const g = document.getElementById("g");
const w = document.getElementById("w");

function getKey(){
  if(!monthPicker.value){
    let now = new Date();
    return "exp_" + now.toISOString().slice(0,7);
  }
  return "exp_" + monthPicker.value;
}
function downloadYearPDF(){

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let rows = [];
  let grand = 0;

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.startsWith("exp_")){
      let month = key.replace("exp_","");
      let data = JSON.parse(localStorage.getItem(key) || "[]");

      let total = 0;

      data.forEach(r=>{
        total +=
          (parseFloat(r[1])||0) +
          (parseFloat(r[3])||0) +
          (parseFloat(r[5])||0) +
          (parseFloat(r[7])||0);
      });

      rows.push([month, "$" + total]);
      grand += total;
    }
  }

  pdf.setFontSize(16);
  pdf.text("Yearly Report", 14, 15);

  pdf.autoTable({
    head: [["Month", "Total"]],
    body: rows,
    startY: 25,
    theme: "striped"
  });

  pdf.text(`Grand Total: $${grand}`, 14, pdf.lastAutoTable.finalY + 10);

  pdf.save("year-report.pdf");
}

function loadYearly(){
  let yearly = {};
  let grandTotal = 0;

  for(let i=0;i<localStorage.length;i++){
    let key = localStorage.key(i);

    if(key.startsWith("exp_")){
      let month = key.replace("exp_","");
      let data = JSON.parse(localStorage.getItem(key) || "[]");

      let total = 0;

      data.forEach(row=>{
        total +=
          (parseFloat(row[1])||0) +
          (parseFloat(row[3])||0) +
          (parseFloat(row[5])||0) +
          (parseFloat(row[7])||0);
      });

      yearly[month] = total;
      grandTotal += total;
    }
  }

  let html = `<h3>📊 Yearly Summary</h3>`;

 Object.keys(yearly).sort().forEach(month=>{
  html += `
    <div style="padding:10px;margin:5px;border:1px solid #ccc;">
      📅 ${month} → $${yearly[month]}

      <button onclick="downloadMonthPDF('${month}')">
        📄 Download Month PDF
      </button>
    </div>
  `;
});

  html += `
    <hr>
    <h3>💰 Grand Total: $${grandTotal}</h3>

    <button onclick="downloadYearPDF()">
      📄 Download Year PDF
    </button>
  `;

  document.getElementById("yearResult").innerHTML = html;
}
window.downloadMonthPDF = function(month){

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let data = JSON.parse(localStorage.getItem("exp_" + month) || "[]");

  let rows = [];
  let total = 0;

  data.forEach(r => {
    rows.push([
      r[0] || "",
      r[1] || "",
      r[2] || "",
      r[3] || "",
      r[4] || "",
      r[5] || "",
      r[6] || "",
      r[7] || ""
    ]);

    total +=
      (parseFloat(r[1])||0) +
      (parseFloat(r[3])||0) +
      (parseFloat(r[5])||0) +
      (parseFloat(r[7])||0);
  });

  pdf.setFontSize(16);
  pdf.text("Monthly Report - " + month, 14, 15);

  pdf.autoTable({
    head: [["Note","Family","Note","Car","Note","My","Note","Her"]],
    body: rows,
    startY: 25,
    theme: "grid"
  });

  pdf.text("Total: $" + total, 14, pdf.lastAutoTable.finalY + 10);

  pdf.save(month + ".pdf");
}

// ➕ Add Row
function addRow(data=[]){
  let tr=document.createElement("tr");

  tr.innerHTML=`
<td><input class="note" data-hint="Date / Note"></td><td><input class="family"></td>
<td><input class="note" data-hint="Date / Note"></td><td><input class="car"></td>
<td><input class="note" data-hint="Date / Note"></td><td><input class="my"></td>
<td><input class="note" data-hint="Date / Note"></td><td><input class="her"></td>
`;

  tbody.appendChild(tr);

  const inputs = tr.querySelectorAll("input");

  inputs.forEach((i, idx) => {

    if (data[idx]) i.value = data[idx];

    i.addEventListener("input", () => {

      if(i.classList.contains("family") ||
         i.classList.contains("car") ||
         i.classList.contains("my") ||
         i.classList.contains("her")){

        i.value = i.value.replace(/[^0-9.]/g, '');

      } else {

        i.value = autoYear(i.value);

        delayedSave(i.value);
        showSuggestions(i);
      }

      calculate();
      save();
    });

    // ⌨️ Keyboard navigation (এটা এখানেই থাকবে)
    i.addEventListener("keydown", (e) => {

      const currentRow = i.closest("tr");
      const allRows = Array.from(tbody.querySelectorAll("tr"));
      const rowIndex = allRows.indexOf(currentRow);
      const colIndex = Array.from(currentRow.querySelectorAll("input")).indexOf(i);

      let target;

      if (e.key === "ArrowRight") {
        target = currentRow.querySelectorAll("input")[colIndex + 1];
      }

      if (e.key === "ArrowLeft") {
        target = currentRow.querySelectorAll("input")[colIndex - 1];
      }

      if (e.key === "ArrowDown" || e.key === "Enter") {
        const nextRow = allRows[rowIndex + 1];
        if (nextRow) target = nextRow.querySelectorAll("input")[colIndex];
      }

      if (e.key === "ArrowUp") {
        const prevRow = allRows[rowIndex - 1];
        if (prevRow) target = prevRow.querySelectorAll("input")[colIndex];
      }

      if (target) {
        e.preventDefault();
        target.focus();
      }

    });

  });
}
function autoYear(val){
  let now = new Date();
  let year = now.getFullYear();

  // 5-10 / 05/10 match করবে
  let match = val.match(/^(\d{1,2})[-\/](\d{1,2})(.*)/);

  if(match){
    let m = match[1].padStart(2,'0');
    let d = match[2].padStart(2,'0');
    let rest = match[3] || "";

    return `${year}-${m}-${d}${rest}`;
  }

  return val;
}
function saveHistory(value){
  if(!value) return;

  value = value.trim();

  if(value === "Date / Note") return;
  if(/^[0-9.]+$/.test(value)) return;
  if(value.length < 3) return;

  if(!history.includes(value)){
    history.push(value);
    localStorage.setItem("suggest_history", JSON.stringify(history));
  }
}
let saveTimer;

function delayedSave(value){
  clearTimeout(saveTimer);

  saveTimer = setTimeout(() => {
    saveHistory(value);
  }, 800);
}
function showSuggestions(input){
  let box = input.parentElement.querySelector(".sugbox");

  if(!box){
    box = document.createElement("div");
    box.className = "sugbox";
    input.parentElement.style.position = "relative";
    input.parentElement.appendChild(box);
  }

  let val = input.value.trim().toLowerCase();

  box.innerHTML = "";

  if(val.length < 1) return;

  history
    .filter(v =>
      v &&
      v.toLowerCase().startsWith(val)
    )
    .slice(0,5)
    .forEach(v=>{
      let d = document.createElement("div");
      d.innerText = v;

      d.onclick = () => {
        input.value = v;
        input.dispatchEvent(new Event("input"));
        box.innerHTML = "";
      };

      box.appendChild(d);
    });
}

// ➖ Remove Row
function removeRow(){
  if(tbody.lastChild) tbody.removeChild(tbody.lastChild);
  calculate();
  save();
}

// 📊 Calculate
function calculate(){
  let t={family:0,car:0,my:0,her:0};

  cols.forEach(c=>{
    document.querySelectorAll("."+c).forEach(i=>{
      t[c]+=parseFloat(i.value)||0;
    });
  });

  f.innerText="$"+t.family;
  c.innerText="$"+t.car;
  m.innerText="$"+t.my;
  h.innerText="$"+t.her;

  let total=t.family+t.car+t.my+t.her;
  g.innerText="$"+total;
  w.innerText="$"+(total-t.car);

  chart.data.datasets[0].data=[t.family,t.car,t.my,t.her];
  chart.update();
}

// 💾 Save
function save(){
  let data = [];

  document.querySelectorAll("#rows tr").forEach(tr=>{
    data.push([...tr.querySelectorAll("input")].map(i=>i.value));
  });

  localStorage.setItem(getKey(), JSON.stringify(data));
}

// 📥 Load
function load(){

  let data = JSON.parse(localStorage.getItem(getKey()) || "[]");

  tbody.innerHTML = "";

  if(data.length === 0){
    for(let i=0;i<6;i++) addRow();
  } else {
    data.forEach(r => addRow(r));
  }

  calculate();
}

// 📸 FIXED IMAGE DOWNLOAD (ONLY FIX)
async function downloadImage(){

  document.body.classList.add("exporting");

  const table = document.getElementById("tableArea");
  const chart = document.getElementById("chartArea");

  await new Promise(r=>setTimeout(r,300));

  const tableCanvas = await html2canvas(table,{
    scale:2,
    backgroundColor:"#fff",
    width:1200
  });

  await new Promise(r=>setTimeout(r,300));

  const chartCanvas = await html2canvas(chart,{
    scale:2,
    backgroundColor:"#fff",
    width:1200
  });

  document.body.classList.remove("exporting");

  const a1=document.createElement("a");
  a1.download="table.png";
  a1.href=tableCanvas.toDataURL("image/png");
  a1.click();

  await new Promise(r=>setTimeout(r,400));

  const a2=document.createElement("a");
  a2.download="chart.png";
  a2.href=chartCanvas.toDataURL("image/png");
  a2.click();
}

// 📄 PDF Export
window.downloadPDF = async function(){

  const { jsPDF } = window.jspdf;
  const pdf=new jsPDF("p","mm","a4");

  const table = document.getElementById("tableArea");
  const chart = document.getElementById("chartArea");

  const tableCanvas = await html2canvas(table,{
    scale:2,
    backgroundColor:"#fff",
    width:1200
  });

  const chartCanvas = await html2canvas(chart,{
    scale:2,
    backgroundColor:"#fff",
    width:1200
  });

  const imgWidth = 210;
  const pageHeight = 297;

  let imgHeight = tableCanvas.height * imgWidth / tableCanvas.width;

  pdf.addImage(tableCanvas.toDataURL("image/png"),"PNG",0,0,imgWidth,imgHeight);

  pdf.addPage();

  imgHeight = chartCanvas.height * imgWidth / chartCanvas.width;

  pdf.addImage(chartCanvas.toDataURL("image/png"),"PNG",0,20,imgWidth,imgHeight);

  pdf.save("report.pdf");
}
function clearScreen(){

  // 1️⃣ সব input clear
  document.querySelectorAll("input").forEach(i=>{
    i.value = "";
  });

  // 2️⃣ suggestion box remove
  document.querySelectorAll(".sugbox").forEach(box=>{
    box.remove();
  });

  // 3️⃣ totals reset
  f.innerText = "$0";
  c.innerText = "$0";
  m.innerText = "$0";
  h.innerText = "$0";
  g.innerText = "$0";
  w.innerText = "$0";

  // 4️⃣ chart reset
  chart.data.datasets[0].data = [0,0,0,0];
  chart.update();

  // 5️⃣ localStorage clear (IMPORTANT)
  //localStorage.removeItem("exp_data");

// 5️⃣ localStorage clear (FIXED)
localStorage.removeItem(getKey());

  // 6️⃣ focus first input
  let first = document.querySelector("input");
  if(first) first.focus();
}
let now = new Date();
monthPicker.value = now.toISOString().slice(0,7);

monthPicker.addEventListener("change", () => {
  load();
  calculate();
  window.scrollTo(0,0); // চাইলে রাখতে পারো
});

// 📊 Chart
let chart=new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{
    labels:["Family","Car","My","Her"],
    datasets:[{
      data:[0,0,0,0],
      backgroundColor:['#4e73df','#e74a3b','#1cc88a','#f6c23e']
    }]
  }
});

load();

</script>

</body>
</html>
