<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { font-family: Arial; background:#eef2f7; padding:10px; }

.card { background:#fff; padding:10px; margin:8px 0; border-radius:8px; }

button { padding:8px 12px; margin:4px; border:none; border-radius:5px; cursor:pointer; }

table { width:100%; border-collapse:collapse; margin-top:10px; }

th, td { border:1px solid #ddd; padding:6px; text-align:center; }

th { background:#007bff; color:white; }

tfoot td { font-weight:bold; background:#f1f1f1; }

input { width:95%; height:36px; text-align:center; border:none; font-size:16px; }

canvas { width:30% !important; height:25% !important; display:block; margin:auto; }

body.exporting button { display:none; }

/* 📱 IMPORTANT FIX → Mobile same as laptop table */
@media (max-width:768px){
  table{
    font-size:14px;
  }
  th,td{
    padding:6px;
  }
  input{
    font-size:14px;
  }
}
</style>
</head>

<body>

<div id="captureArea">

<h2>💰 Expense Dashboard</h2>

<div class="card" style="text-align:center;">
<input type="month" id="monthPicker">
</div>

<div class="card" style="text-align:center;">
<button onclick="addRow()">➕ Add Row</button>
<button onclick="removeRow()">➖ Remove Row</button>
<button onclick="downloadImage()">📸 Image</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Family</th><th>$</th>
<th>Car</th><th>$</th>
<th>My</th><th>$</th>
<th>Her</th><th>$</th>
</tr>
</thead>

<tbody id="rows"></tbody>

<tfoot>
<tr>
<td>Total</td><td id="f">$0</td>
<td>Total</td><td id="c">$0</td>
<td>Total</td><td id="m">$0</td>
<td>Total</td><td id="h">$0</td>
</tr>
<tr>
<td colspan="7">Grand</td>
<td id="g">$0</td>
</tr>
<tr>
<td colspan="7">Without Car</td>
<td id="w">$0</td>
</tr>
</tfoot>
</table>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>
const cols=["family","car","my","her"];
const tbody=document.getElementById("rows");

// ➕ Add row
function addRow(data=[]){
  let tr=document.createElement("tr");
  tr.innerHTML=`
<td><input></td><td><input class="family"></td>
<td><input></td><td><input class="car"></td>
<td><input></td><td><input class="my"></td>
<td><input></td><td><input class="her"></td>`;
  tbody.appendChild(tr);

  tr.querySelectorAll("input").forEach((i,idx)=>{
    if(data[idx]) i.value=data[idx];

    i.addEventListener("input",()=>{
      i.value=i.value.replace(/[^0-9.]/g,'');
      calculate(); save();
    });
  });
}

// ➖ Remove row
function removeRow(){
  if(tbody.lastChild) tbody.removeChild(tbody.lastChild);
  calculate(); save();
}

// 📊 Calculate
function calculate(){
  let t={family:0,car:0,my:0,her:0};

  cols.forEach(c=>{
    document.querySelectorAll("."+c).forEach(i=>{
      t[c]+=parseFloat(i.value)||0;
    });
  });

  f.innerText="$"+t.family;
  c.innerText="$"+t.car;
  m.innerText="$"+t.my;
  h.innerText="$"+t.her;

  let gtotal=t.family+t.car+t.my+t.her;
  g.innerText="$"+gtotal;
  w.innerText="$"+(gtotal-t.car);

  chart.data.datasets[0].data=[t.family,t.car,t.my,t.her];
  chart.update();
}

// 💾 Save
function save(){
  let data=[];
  document.querySelectorAll("#rows tr").forEach(tr=>{
    data.push([...tr.querySelectorAll("input")].map(i=>i.value));
  });
  localStorage.setItem("exp",JSON.stringify(data));
}

// 📥 Load
function load(){
  let d=JSON.parse(localStorage.getItem("exp")||"[]");
  tbody.innerHTML="";
  if(d.length===0) for(let i=0;i<6;i++) addRow();
  else d.forEach(r=>addRow(r));
  calculate();
}

// 📸 ONLY FIXED IMAGE EXPORT
async function downloadImage(){

  document.body.classList.add("exporting");

  const tableArea = document.querySelector("table").parentElement;
  const chartArea = document.getElementById("chart");

  // 📋 TABLE (laptop style same)
  const tableCanvas = await html2canvas(tableArea,{
    scale:2,
    backgroundColor:"#fff",
    useCORS:true
  });

  // 📊 CHART
  const chartCanvas = await html2canvas(chartArea,{
    scale:2,
    backgroundColor:"#fff",
    useCORS:true
  });

  document.body.classList.remove("exporting");

  // download table
  let a1=document.createElement("a");
  a1.download="table.png";
  a1.href=tableCanvas.toDataURL("image/png");
  a1.click();

  // download chart
  setTimeout(()=>{
    let a2=document.createElement("a");
    a2.download="chart.png";
    a2.href=chartCanvas.toDataURL("image/png");
    a2.click();
  },500);
}

// 📊 Chart
let chart=new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{
    labels:["Family","Car","My","Her"],
    datasets:[{
      data:[0,0,0,0],
      backgroundColor:['#4e73df','#e74a3b','#1cc88a','#f6c23e']
    }]
  }
});

load();
</script>

</body>
</html>
